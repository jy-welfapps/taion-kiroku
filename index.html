<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>🌡 たいおんきろく</title>
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #e8f8f5; font-family: sans-serif; }

    /* ---- キー入力画面 ---- */
    #key-screen {
      position: fixed;
      inset: 0;
      background: #e8f8f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 20;
    }
    #key-screen .icon { font-size: 3rem; }
    #key-screen .title { font-size: 1.3rem; font-weight: bold; color: #2c3e50; }
    #key-screen input {
      padding: 12px 20px;
      border: 2px solid #b2dfdb;
      border-radius: 10px;
      font-size: 1.1rem;
      background: white;
      color: #2c3e50;
      text-align: center;
      letter-spacing: 4px;
      width: 200px;
    }
    #key-screen button {
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      width: 200px;
    }
    #key-error {
      color: #e74c3c;
      font-size: 0.9rem;
      min-height: 1.2em;
    }

    /* ---- ローディング画面 ---- */
    #loading {
      position: fixed;
      inset: 0;
      background: #e8f8f5;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
      transition: opacity 0.4s;
    }
    #loading.visible { display: flex; }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .icon { font-size: 4rem; }
    #loading .title { font-size: 1.4rem; font-weight: bold; color: #2c3e50; }
    #loading .spinner {
      width: 44px; height: 44px;
      border: 4px solid #b2dfdb;
      border-top-color: #27ae60;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    #loading .msg { font-size: 0.95rem; color: #7f8c8d; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- メインiframe ---- */
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>

  <!-- キー入力画面 -->
  <div id="key-screen">
    <div class="icon">🌡️</div>
    <div class="title">たいおんきろく</div>
    <input type="password" id="api-key-input" placeholder="アクセスキー" inputmode="text">
    <div id="key-error"></div>
    <button onclick="submitKey()">はいる</button>
  </div>

  <!-- ローディング画面 -->
  <div id="loading">
    <div class="icon">🌡️</div>
    <div class="title">たいおんきろく</div>
    <div class="spinner"></div>
    <div class="msg">よみこみ中…</div>
  </div>

  <!-- GASアプリ本体（キー認証後に動的にセット） -->
  <iframe id="app-frame" src="" allow="clipboard-read; clipboard-write" allowfullscreen
    onload="onFrameLoad()"></iframe>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwKFDYdc9eBzLt2-k2kmur0KK6JySFPXjRvoF3pD2weROpBeea5azUN_2EAJbX9BhQGFQ/exec';
    const STORAGE_KEY = 'taion_api_key';
    let frameLoaded = false;

    // 前回のキーが保存されていれば自動でログイン試行
    window.addEventListener('load', () => {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        document.getElementById('api-key-input').value = saved;
        loadApp(saved);
      }
    });

    function submitKey() {
      const key = document.getElementById('api-key-input').value.trim();
      if (!key) {
        document.getElementById('key-error').textContent = 'キーをにゅうりょくしてください';
        return;
      }
      loadApp(key);
    }

    function loadApp(key) {
      document.getElementById('key-error').textContent = '';
      document.getElementById('key-screen').style.display = 'none';
      document.getElementById('loading').classList.add('visible');
      frameLoaded = false;
      document.getElementById('app-frame').src = GAS_URL + '?key=' + encodeURIComponent(key);
      localStorage.setItem(STORAGE_KEY, key);
    }

    function onFrameLoad() {
      // iframeが読み込まれたらローディングを消す
      // アクセス拒否の場合もonloadは発火するが、GAS側でエラー画面を返す
      document.getElementById('loading').classList.remove('visible');
      document.getElementById('loading').classList.add('hidden');
    }

    // Enterキーでも送信
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.getElementById('key-screen').style.display !== 'none') {
        submitKey();
      }
    });
  </script>
</body>
</html>
