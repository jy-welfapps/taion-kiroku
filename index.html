<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>🌡 たいおんきろく</title>
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #e8f8f5; }

    #loading {
      position: fixed;
      inset: 0;
      background: #e8f8f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .icon { font-size: 4rem; }
    #loading .title { font-family: sans-serif; font-size: 1.4rem; font-weight: bold; color: #2c3e50; }
    #loading .spinner {
      width: 44px; height: 44px;
      border: 4px solid #b2dfdb;
      border-top-color: #27ae60;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    #loading .msg { font-family: sans-serif; font-size: 0.95rem; color: #7f8c8d; }
    @keyframes spin { to { transform: rotate(360deg); } }

    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="icon">🌡️</div>
    <div class="title">たいおんきろく</div>
    <div class="spinner"></div>
    <div class="msg">よみこみ中…</div>
  </div>
  <iframe
    src="https://script.google.com/macros/s/AKfycbwKFDYdc9eBzLt2-k2kmur0KK6JySFPXjRvoF3pD2weROpBeea5azUN_2EAJbX9BhQGFQ/exec"
    allow="clipboard-read; clipboard-write"
    allowfullscreen
    onload="document.getElementById('loading').classList.add('hidden')">
  </iframe>
</body>
</html>
